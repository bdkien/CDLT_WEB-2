# spring.application.name=example01
# Cấu hình kết nối MySQL (Đổi tên etech_db thành tên database thực tế của bạn)
spring.datasource.url=jdbc:mysql://localhost:3306/etech?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Cấu hình Hibernate JPA tự động tạo bảng dựa trên Entity
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect